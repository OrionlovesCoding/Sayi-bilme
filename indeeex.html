<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayıyı Bil</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrapper {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 900px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .game {
      flex: 1;
      min-width: 280px;
      max-width: 420px;
      text-align: center;
    }

    .title {
      font-size: 52px;
      color: gray;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .streaks {
      font-size: 15px;
      color: #bbb;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    .inputBox {
      width: 100%;
      max-width: 260px;
      padding: 16px;
      font-size: 24px;
      text-align: center;
      border: 2px solid #444;
      border-radius: 12px;
      background: #111;
      color: white;
      outline: none;
      margin-bottom: 12px;
    }

    .inputBox:focus {
      border-color: #888;
    }

    .btn {
      width: 100%;
      max-width: 260px;
      padding: 14px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #222;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .result {
      font-size: 28px;
      font-weight: bold;
      min-height: 40px;
    }

    .win {
      color: #00ff88;
    }

    .lose {
      color: #ff4444;
    }

    .info {
      margin-top: 10px;
      color: #999;
      font-size: 18px;
      min-height: 24px;
    }

    .panel {
      width: 220px;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 16px;
    }

    .panel h3 {
      text-align: center;
      color: #ccc;
      margin-bottom: 12px;
      font-size: 20px;
    }

    .topList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topList li {
      background: #151515;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .wrapper {
        flex-direction: column;
        align-items: center;
      }

      .panel {
        width: 100%;
        max-width: 420px;
      }

      .title {
        font-size: 42px;
      }

      .result {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="game">
      <div class="title">Sayıyı Bil</div>

      <div class="streaks">
        <div>Bilme Streak: <span id="winStreak">0</span> | En Yüksek: <span id="bestWinStreak">0</span></div>
        <div>Bilememe Streak: <span id="loseStreak">0</span> | En Yüksek: <span id="bestLoseStreak">0</span></div>
      </div>

      <input
        type="text"
        id="guessInput"
        class="inputBox"
        placeholder="0 - 100"
        inputmode="numeric"
        autocomplete="off"
      />

      <br>

      <button id="guessBtn" class="btn">Tahmin Et</button>

      <div id="result" class="result"></div>
      <div id="info" class="info"></div>
    </div>

    <div class="panel">
      <h3>En Çok Gelen 5 Sayı</h3>
      <ul id="topList" class="topList">
        <li>Henüz veri yok</li>
      </ul>
    </div>
  </div>

  <script>
    // Oyun verileri
    let winStreak = 0;
    let loseStreak = 0;
    let bestWinStreak = 0;
    let bestLoseStreak = 0;
    let numberCounts = {};

    // Elementler
    const guessInput = document.getElementById("guessInput");
    const guessBtn = document.getElementById("guessBtn");
    const result = document.getElementById("result");
    const info = document.getElementById("info");
    const topList = document.getElementById("topList");

    // İlk sayı
    let currentNumber = createNumber();

    function createNumber() {
      const num = Math.floor(Math.random() * 101);

      if (numberCounts[num] === undefined) {
        numberCounts[num] = 0;
      }

      numberCounts[num]++;
      updateTopList();

      return num;
    }

    function updateTopList() {
      const entries = Object.entries(numberCounts);

      if (entries.length === 0) {
        topList.innerHTML = "<li>Henüz veri yok</li>";
        return;
      }

      entries.sort(function(a, b) {
        return b[1] - a[1];
      });

      const topFive = entries.slice(0, 5);

      topList.innerHTML = "";

      for (let i = 0; i < topFive.length; i++) {
        const num = topFive[i][0];
        const count = topFive[i][1];

        const li = document.createElement("li");
        li.textContent = (i + 1) + ". " + num + " (" + count + "x)";
        topList.appendChild(li);
      }
    }

    function updateStreaks() {
      document.getElementById("winStreak").textContent = winStreak;
      document.getElementById("loseStreak").textContent = loseStreak;
      document.getElementById("bestWinStreak").textContent = bestWinStreak;
      document.getElementById("bestLoseStreak").textContent = bestLoseStreak;
    }

    function playGame() {
      const value = guessInput.value.trim();

      // Sadece tam sayı kontrolü
      if (!/^\d+$/.test(value)) {
        result.textContent = "0-100 arası tam sayı gir!";
        result.className = "result lose";
        info.textContent = "";
        return;
      }

      const guess = parseInt(value, 10);

      if (guess < 0 || guess > 100) {
        result.textContent = "0-100 arası sayı gir!";
        result.className = "result lose";
        info.textContent = "";
        return;
      }

      if (guess === currentNumber) {
        winStreak++;
        loseStreak = 0;

        if (winStreak > bestWinStreak) {
          bestWinStreak = winStreak;
        }

        result.textContent = "KAZANDIN!";
        result.className = "result win";
      } else {
        loseStreak++;
        winStreak = 0;

        if (loseStreak > bestLoseStreak) {
          bestLoseStreak = loseStreak;
        }

        result.textContent = "KAYBETTİN!";
        result.className = "result lose";
      }

      info.textContent = "Doğru sayı: " + currentNumber;

      updateStreaks();

      // Yeni tur
      currentNumber = createNumber();

      guessInput.value = "";
    }

    guessBtn.addEventListener("click", playGame);

    guessInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        playGame();
      }
    });

    updateStreaks();
  </script>
</body>
</html>
